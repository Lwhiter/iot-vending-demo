<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟智能售货机</title>
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; padding: 50px; background-color: #f4f5f7; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); max-width: 300px; margin: 0 auto; }
        .btn { display: block; width: 100%; padding: 15px; margin: 20px 0; font-size: 18px; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .btn-wechat { background-color: #07c160; }
        .btn-alipay { background-color: #1677ff; }
        #status { color: #888; font-size: 14px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>智能售货机</h2>
        <p>当前设备号: <strong id="dev-id">识别中...</strong></p>
        
        <button class="btn btn-wechat" onclick="simulatePay(100)">模拟微信 10.00 元</button>
        <button class="btn btn-alipay" onclick="simulatePay(50)">模拟支付宝 5.00 元</button>
        
        <p id="status">MQTT 云端连接中...</p>
    </div>

    <script>
        // 1. 提取网址中的 ?device=MAC_vending 参数
        const urlParams = new URLSearchParams(window.location.search);
        const deviceId = urlParams.get('device') || 'DEFAULT_MAC'; // 如果没带参数，默认叫 DEFAULT_MAC
        document.getElementById('dev-id').innerText = deviceId;

        // 2. 连接到免费的 EMQX 公共测试服务器
        // 注意：因为网页大多是 https，所以这里必须用加密的 wss 协议和 8084 端口
        const client = mqtt.connect('wss://broker.emqx.io:8084/mqtt');

        client.on('connect', function () {
            document.getElementById('status').innerText = '✅ 云端服务器已连接';
            document.getElementById('status').style.color = 'green';
        });

        client.on('error', function (error) {
            document.getElementById('status').innerText = '❌ 云端连接失败';
            document.getElementById('status').style.color = 'red';
        });

        // 3. 点击支付按钮触发的函数
        function simulatePay(amount) {
            // 组合要发送的指令，格式为 "PAY,金额" (金额单位为角)
            const message = 'PAY,' + amount + '\n';
            // 根据设备号组合唯一的通信主题 (Topic)
            const topic = 'vending_machine/' + deviceId + '/cmd';
            
            // 通过云端把指令发出去
            client.publish(topic, message);
            
            alert('支付成功！已向设备 ' + deviceId + ' 发送出货指令。');
        }
    </script>
</body>
</html>
